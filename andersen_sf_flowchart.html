<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andersen Salesforce — End-to-End Process Flow</title>
<style>
  :root {
    --bg: #f0f2f7;
    --surface: #ffffff;
    --surface2: #e8eaf0;
    --border: #c8cdd8;
    --text: #1a1f2e;
    --text2: #4a5068;
    --text3: #8890a8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    overflow: hidden;
    height: 100vh;
    user-select: none;
  }

  /* ── Toolbar ── */
  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 48px;
    background: rgba(255,255,255,0.97);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; padding: 0 16px;
    backdrop-filter: blur(8px);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  #toolbar h1 {
    font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
    color: var(--text2); text-transform: uppercase;
    white-space: nowrap; margin-right: 8px;
  }
  .sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
  .btn {
    padding: 5px 12px; border-radius: 5px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text2); font-size: 11px;
    cursor: pointer; transition: all .15s; font-family: inherit;
    white-space: nowrap; font-weight: 500;
  }
  .btn:hover { background: var(--surface2); color: var(--text); border-color: #a0a8c0; }
  .btn.active { background: #ddeeff; border-color: #5090d0; color: #1a50a0; font-weight: 600; }
  #zoom-info {
    font-size: 11px; color: var(--text3); min-width: 44px; text-align: right;
  }
  .spacer { flex: 1; }

  /* ── Legend ── */
  #legend {
    position: fixed; top: 56px; right: 12px; z-index: 90;
    background: rgba(255,255,255,0.97); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; font-size: 10px;
    backdrop-filter: blur(6px); min-width: 168px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }
  #legend h2 { font-size: 10px; color: var(--text3); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .06em; font-weight: 700; }
  .leg { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
  .leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .leg span { color: var(--text2); font-size: 10px; }
  #legend .sep-l { height: 1px; background: var(--border); margin: 7px 0; }
  .leg-diamond { width: 10px; height: 10px; background: #c8960a; transform: rotate(45deg); flex-shrink: 0; }
  .leg-oval { width: 14px; height: 10px; border-radius: 5px; background: #2a8a40; flex-shrink: 0; }

  /* ── Canvas ── */
  #canvas-wrap {
    position: fixed; top: 48px; left: 0; right: 0; bottom: 0;
    overflow: hidden; cursor: grab;
    background: var(--bg);
  }
  #canvas-wrap.dragging { cursor: grabbing; }
  #canvas {
    position: absolute; transform-origin: 0 0;
  }

  /* ── SVG nodes ── */
  .node { cursor: pointer; }
  .node rect, .node polygon, .node ellipse {
    transition: filter .15s;
  }
  .node:hover rect, .node:hover polygon, .node:hover ellipse {
    filter: brightness(0.92) saturate(1.2);
  }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed; z-index: 200; pointer-events: none;
    background: rgba(255,255,255,0.98); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; font-size: 11px;
    max-width: 300px; display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  #tooltip h3 { font-size: 12px; margin-bottom: 6px; color: var(--text); font-weight: 600; }
  #tooltip p { color: var(--text2); line-height: 1.5; font-size: 10.5px; }
  #tooltip .roles { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
  #tooltip .role-pill {
    padding: 2px 7px; border-radius: 10px; font-size: 9px; font-weight: 600;
    letter-spacing: .04em;
  }

  /* Mini-map */
  #minimap {
    position: fixed; bottom: 16px; right: 16px; z-index: 90;
    width: 160px; height: 90px;
    background: rgba(255,255,255,0.92); border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  #minimap canvas { width: 100%; height: 100%; }
</style>
</head>

// ─────────────────────────────────────────────
//  LAYOUT helpers
// ─────────────────────────────────────────────
function nodeById(id){ return nodes.find(n=>n.id===id); }

function nodeBounds(n){
  if(n.shape==='diamond'){
    const s=GS; return { x:n.x-s, y:n.y-s/2, w:s*2, h:s };
  } else if(n.shape==='oval'||n.shape==='start'){
    return { x:n.x-OS, y:n.y-OS/2+4, w:OS*2, h:OS-8 };
  } else {
    return { x:n.x-W/2, y:n.y-H/2, w:W, h:H };
  }
}

function nodeCenter(n){ return { x:n.x, y:n.y }; }

// Edge port: find point on border closest to target
function edgePort(from, to){
  const fb=nodeBounds(from), tb=nodeBounds(to);
  const fc=nodeCenter(from), tc=nodeCenter(to);
  const dx=tc.x-fc.x, dy=tc.y-fc.y;
  // Exit port (bottom by default, left/right if more horizontal)
  let ex=fc.x, ey=fc.y;
  const adx=Math.abs(dx), ady=Math.abs(dy);
  if(ady>adx*0.5){
    // mostly vertical
    if(dy>0){ ey=fb.y+fb.h; }else{ ey=fb.y; }
    ex=fc.x;
  } else {
    if(dx>0){ ex=fb.x+fb.w; }else{ ex=fb.x; }
    ey=fc.y;
  }
  // Entry port
  let ix=tc.x, iy=tc.y;
  if(ady>adx*0.5){
    if(dy>0){ iy=tb.y; }else{ iy=tb.y+tb.h; }
    ix=tc.x;
  } else {
    if(dx>0){ ix=tb.x; }else{ ix=tb.x+tb.w; }
    iy=tc.y;
  }
  return { ex, ey, ix, iy };
}

// Arrow markers
function addMarker(id,color){
  const m=document.createElementNS(SVG_NS,'marker');
  m.setAttribute('id',id);
  m.setAttribute('viewBox','0 0 10 10');
  m.setAttribute('refX','8'); m.setAttribute('refY','5');
  m.setAttribute('markerWidth','6'); m.setAttribute('markerHeight','6');
  m.setAttribute('orient','auto-start-reverse');
  const p=document.createElementNS(SVG_NS,'path');
  p.setAttribute('d','M2 1L8 5L2 9');
  p.setAttribute('fill','none');
  p.setAttribute('stroke',color);
  p.setAttribute('stroke-width','1.5');
  p.setAttribute('stroke-linecap','round');
  p.setAttribute('stroke-linejoin','round');
  m.appendChild(p); defs.appendChild(m);
}

markerColors.forEach((c,i)=>addMarker('arr'+i,c));
function markerForColor(c){
  const i=markerColors.indexOf(c);
  return i>=0?'url(#arr'+i+')':'url(#arr0)';
}

// Compute canvas bounds
function canvasBounds(){
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  nodes.forEach(n=>{
    const b=nodeBounds(n);
    minX=Math.min(minX,b.x-20);
    minY=Math.min(minY,b.y-20);
    maxX=Math.max(maxX,b.x+b.w+20);
    maxY=Math.max(maxY,b.y+b.h+40);
  });
  return {minX,minY,maxX,maxY};
}

// Draw edges
const edgeGroup=document.createElementNS(SVG_NS,'g');
edgeGroup.setAttribute('id','edge-group');
edges.forEach(e=>{
  const fn=nodeById(e.from), tn=nodeById(e.to);
  if(!fn||!tn) return;
  const { ex, ey, ix, iy }=edgePort(fn,tn);
  const midX=(ex+ix)/2, midY=(ey+iy)/2;

  // Draw path (L-bend routing)
  const path=document.createElementNS(SVG_NS,'path');
  let d;
  const dx=ix-ex, dy=iy-ey;
  // Simple L-bend: go vertical then horizontal
  if(Math.abs(dy)>Math.abs(dx)*0.5){
    const my=(ey+iy)/2;
    d=`M ${ex} ${ey} L ${ex} ${my} L ${ix} ${my} L ${ix} ${iy}`;
  } else {
    const mx=(ex+ix)/2;
    d=`M ${ex} ${ey} L ${mx} ${ey} L ${mx} ${iy} L ${ix} ${iy}`;
  }
  path.setAttribute('d',d);
  path.setAttribute('fill','none');
  path.setAttribute('stroke',e.color);
  path.setAttribute('stroke-width', e.style==='dashed'?'1.2':'1.5');
  if(e.style==='dashed') path.setAttribute('stroke-dasharray','5 4');
  path.setAttribute('marker-end', markerForColor(e.color));
  path.setAttribute('opacity','0.8');
  edgeGroup.appendChild(path);

  // Edge label
  if(e.label){
    const lx=midX, ly=midY;
    const lines=e.label.split('\n');
    lines.forEach((line,li)=>{
      const t=document.createElementNS(SVG_NS,'text');
      t.setAttribute('x',lx);
      t.setAttribute('y',ly+li*12);
      t.setAttribute('text-anchor','middle');
      t.setAttribute('fill','#505870');
      t.setAttribute('font-family',"'Helvetica Neue',Arial,sans-serif");
      t.setAttribute('font-size','9');
      t.setAttribute('opacity','0.9');
      // small bg rect for readability
      t.textContent=line;
      edgeGroup.appendChild(t);
    });
  }
});
svg.appendChild(edgeGroup);

    tt.style.left=(e.clientX+14)+'px';
    tt.style.top=(e.clientY-10)+'px';
  });
  g.addEventListener('mousemove',(e)=>{
    const tt=document.getElementById('tooltip');
    tt.style.left=(e.clientX+14)+'px';
    tt.style.top=(e.clientY-10)+'px';
  });
  g.addEventListener('mouseleave',()=>{
    document.getElementById('tooltip').style.display='none';
  });

  nodeGroup.appendChild(g);
});
svg.appendChild(nodeGroup);

// ─────────────────────────────────────────────
//  PAN & ZOOM
// ─────────────────────────────────────────────
let scale=0.28, tx=30, ty=20;
let dragging=false, lastX=0, lastY=0;
const wrap=document.getElementById('canvas-wrap');

function applyTransform(){
  svg.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  document.getElementById('zoom-info').textContent=Math.round(scale*100)+'%';
  drawMinimap();
}
applyTransform();

wrap.addEventListener('mousedown',e=>{
  if(e.button!==0) return;
  dragging=true; lastX=e.clientX; lastY=e.clientY;
  wrap.classList.add('dragging');
});
window.addEventListener('mouseup',()=>{ dragging=false; wrap.classList.remove('dragging'); });
window.addEventListener('mousemove',e=>{
  if(!dragging) return;
  tx+=e.clientX-lastX; ty+=e.clientY-lastY;
  lastX=e.clientX; lastY=e.clientY;
  applyTransform();
});
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const factor=e.deltaY<0?1.1:0.9;
  const rect=wrap.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  tx=mx-(mx-tx)*factor; ty=my-(my-ty)*factor;
  scale*=factor; scale=Math.max(0.1,Math.min(4,scale));
  applyTransform();
},{passive:false});

function zoom(f){
  const rect=wrap.getBoundingClientRect();
  const cx=rect.width/2, cy=rect.height/2;
  tx=cx-(cx-tx)*f; ty=cy-(cy-ty)*f;
  scale*=f; scale=Math.max(0.1,Math.min(4,scale));
  applyTransform();
}

function resetView(){
  const rect=wrap.getBoundingClientRect();
  scale=0.28; tx=30; ty=20;
  applyTransform();
}

// ─────────────────────────────────────────────
//  FILTER SECTIONS
// ─────────────────────────────────────────────
function filterSection(sec){
  document.querySelectorAll('.btn[id^="btn-"]').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+sec).classList.add('active');
  nodeGroup.querySelectorAll('.node').forEach(g=>{
    const ns=g.getAttribute('data-section');
    g.style.opacity=(sec==='all'||ns===sec)?'1':'0.08';
  });
  edgeGroup.querySelectorAll('path,text').forEach((el,i)=>{
    // Show all edges if 'all'
    if(sec==='all'){ el.style.opacity=''; return; }
    // Otherwise filter based on connected nodes
    el.style.opacity='0.05';
  });
  if(sec!=='all'){
    edges.forEach((e,i)=>{
      const fn=nodeById(e.from), tn=nodeById(e.to);
      if(fn&&tn&&(fn.section===sec||tn.section===sec)){
        // show edge paths and labels
      }
    });
  }
}

// ─────────────────────────────────────────────
//  MINIMAP
// ─────────────────────────────────────────────
function drawMinimap(){
  const mm=document.getElementById('mm-canvas');
  const ctx=mm.getContext('2d');
  mm.width=160; mm.height=90;
  ctx.fillStyle='#f0f2f7';
  ctx.fillRect(0,0,160,90);

  const sx=160/CW, sy=90/CH;
  const s2=Math.min(sx,sy)*0.8;

  nodes.forEach(n=>{
    const col={sales:'#5070c0',rfp:'#9050c0',staffing:'#20a060'}[n.section]||'#8090b0';
    ctx.fillStyle=col;
    const mx=(n.x-bounds.minX+50)*s2+5;
    const my=(n.y-bounds.minY+50)*s2+5;
    ctx.fillRect(mx-3,my-2,6,4);
  });

  // Viewport indicator
  const vw=wrap.offsetWidth/scale, vh=wrap.offsetHeight/scale;
  const vx=(-tx/scale-bounds.minX+50)*s2+5;
  const vy=(-ty/scale-bounds.minY+50)*s2+5;
  ctx.strokeStyle='rgba(0,0,0,0.4)';
  ctx.lineWidth=1;
  ctx.strokeRect(vx, vy, vw*s2, vh*s2);
}
drawMinimap();
</script>
